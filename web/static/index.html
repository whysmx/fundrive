<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>文叔叔 Web 管理</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Wenshushu Drive</p>
          <h1>文叔叔 Web 管理</h1>
        </div>
        <div class="status-pill" id="status-pill" data-testid="status-badge">
          <span class="status-dot" aria-hidden="true"></span>
          <span id="status-text">连接中</span>
        </div>
      </header>

      <main class="workspace">
        <section class="panel upload-panel" aria-labelledby="upload-title">
          <div class="section-head">
            <div>
              <h2 id="upload-title">上传文件</h2>
              <p>匿名上传到文叔叔，完成后生成分享链接。</p>
            </div>
            <button class="ghost-button" id="refresh-button" type="button">刷新</button>
          </div>

          <form id="upload-form" class="upload-box">
            <label class="file-picker" for="file-input">
              <span class="file-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-label="">
                  <path d="M14 2H7a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7z"></path>
                  <path d="M14 2v5h5"></path>
                  <path d="M12 18v-6"></path>
                  <path d="m9 15 3-3 3 3"></path>
                </svg>
              </span>
              <span>
                <strong id="file-label">选择文件</strong>
                <small>支持单文件上传，文件会临时保存在文叔叔。</small>
              </span>
            </label>
            <input id="file-input" name="file" type="file" data-testid="upload-input" />
            <div class="field-row">
              <label for="upload-name">显示文件名</label>
              <input id="upload-name" name="filename" type="text" placeholder="默认使用原文件名" />
            </div>
            <button class="primary-button" id="upload-button" type="submit" data-testid="upload-button">开始上传</button>
          </form>
        </section>

        <section class="panel metrics-panel" aria-labelledby="storage-title" data-testid="storage-panel">
          <div class="section-head compact">
            <div>
              <h2 id="storage-title">空间信息</h2>
              <p>来自匿名账号的实时配额。</p>
            </div>
          </div>
          <div class="metric-grid">
            <div class="metric">
              <span>已用</span>
              <strong id="used-space">-- GB</strong>
            </div>
            <div class="metric">
              <span>剩余</span>
              <strong id="free-space">-- GB</strong>
            </div>
            <div class="metric">
              <span>总计</span>
              <strong id="total-space">-- GB</strong>
            </div>
          </div>
        </section>

        <section class="panel download-panel" aria-labelledby="download-title" data-testid="download-result">
          <div class="section-head compact">
            <div>
              <h2 id="download-title">下载分享</h2>
              <p>输入文叔叔分享链接，文件保存到本机下载目录。</p>
            </div>
          </div>
          <form id="download-form" class="form-stack">
            <div class="field-row">
              <label for="share-url">分享链接</label>
              <input id="share-url" name="share_url" type="url" placeholder="https://www.wenshushu.cn/f/..." required data-testid="download-url-input" />
            </div>
            <div class="field-row">
              <label for="download-name">保存文件名</label>
              <input id="download-name" name="filename" type="text" placeholder="可选，默认使用远端文件名" />
            </div>
            <label class="check-row">
              <input id="overwrite" type="checkbox" />
              <span>允许覆盖同名文件</span>
            </label>
            <button class="secondary-button" id="download-button" type="submit" data-testid="download-button">开始下载</button>
            <p class="result-line" id="download-result-text">等待下载任务</p>
          </form>
        </section>

        <section class="panel records-panel" aria-labelledby="records-title" data-testid="file-list">
          <div class="section-head">
            <div>
              <h2 id="records-title">上传记录</h2>
              <p>记录保存在本机 SQLite，便于后续复制分享链接。</p>
            </div>
            <div class="search-box">
              <label class="sr-only" for="search-input">搜索文件</label>
              <input id="search-input" type="search" placeholder="搜索文件名或链接" data-testid="search-input" />
              <button class="ghost-button search-button" id="search-button" type="button" data-testid="search-button">搜索</button>
            </div>
          </div>

          <div class="table-wrap" data-testid="search-results">
            <table>
              <thead>
                <tr>
                  <th>文件名</th>
                  <th>大小</th>
                  <th>上传时间</th>
                  <th>分享链接</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="files-body" data-testid="upload-records">
                <tr>
                  <td colspan="5" class="empty-cell">暂无记录</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>
      </main>

      <div class="toast" id="toast" role="status" aria-live="polite"></div>
    </div>

    <script src="/static/app.js" defer></script>
  </body>
</html>
